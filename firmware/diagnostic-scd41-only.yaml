# DIAGNOSTIC CONFIG — SCD41 only with factory reset button

esphome:
  name: air-quality-sensor
  friendly_name: Air Quality Sensor

esp32:
  board: esp32-c3-devkitm-1
  variant: ESP32C3
  framework:
    type: esp-idf

logger:
  level: DEBUG

api:
  encryption:
    key: "e2nRX9doZnRav1ZcZYL2S5lRmCTXi/vQ5gjhxwQZTag="

ota:
  - platform: esphome
    password: "airqualitysensorota"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Air-Quality Fallback"
    password: "configureme"

captive_portal:

# Enable the built-in web server so we can press buttons from the browser
web_server:
  port: 80

i2c:
  sda: GPIO7
  scl: GPIO8
  scan: true
  frequency: 50kHz

sensor:
  - platform: scd4x
    id: scd41_sensor
    address: 0x62
    update_interval: 30s
    measurement_mode: periodic
    co2:
      name: "CO2"
    temperature:
      name: "Temperature (SCD41)"
    humidity:
      name: "Humidity (SCD41)"

# Add buttons we can press to recover the sensor
button:
  - platform: template
    name: "SCD41 Factory Reset"
    on_press:
      - lambda: 'id(scd41_sensor).factory_reset();'

  - platform: restart
    name: "Restart ESP"