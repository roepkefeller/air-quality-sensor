# ESPHome configuration for custom air quality PCB
# Board: ESP32-C3
# Sensors: BMP280, SCD41, SGP41, SHT40 (all I2C)
# Indicators: WS2812 RGB LED (air quality), standard LED (fault)

esphome:
  name: air-quality-sensor
  friendly_name: Air Quality Sensor
  on_boot:
    priority: -100
    # Wait for all components to fully initialize before allowing any
    # sensor-driven LED updates. This avoids a crash in the WS2812
    # driver if it gets called before its buffer is ready.
    # (restore_mode: RESTORE_DEFAULT_OFF on the light keeps it off
    # at boot, so no explicit turn-off is needed.)
    then:
      - delay: 5s
      - globals.set:
          id: led_ready
          value: 'true'

esp32:
  board: esp32-c3-devkitm-1
  variant: ESP32C3
  framework:
    type: esp-idf

logger:
  level: DEBUG

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Air-Quality Fallback"
    password: "configureme"

captive_portal:

web_server:
  port: 80

# ---------------------------------------------------------------------------
# Globals
# ---------------------------------------------------------------------------
globals:
  - id: brightness_initialized
    type: bool
    restore_value: true
    initial_value: 'false'
  # Tracks whether we've set the LED color at least once since this boot.
  - id: led_first_update_done
    type: bool
    restore_value: false   # resets to false on every boot
    initial_value: 'false'
  # Persists the user's last "on" / "off" choice across reboots.
  - id: user_wants_led_on
    type: bool
    restore_value: true
    initial_value: 'true'
  # Persists the user's chosen brightness explicitly.
  - id: user_brightness
    type: float
    restore_value: true
    initial_value: '0.25'
  # Becomes true 5s after boot, indicating the LED driver is initialized
  # and safe to drive. Avoids a crash if the script fires before then.
  - id: led_ready
    type: bool
    restore_value: false
    initial_value: 'false'

# ---------------------------------------------------------------------------
# I2C bus
# ---------------------------------------------------------------------------
i2c:
  sda: GPIO7
  scl: GPIO8
  scan: true
  frequency: 50kHz

# ---------------------------------------------------------------------------
# Sensors
# ---------------------------------------------------------------------------
sensor:
  # --- SHT40: temperature + humidity (high accuracy) ---
  # The SHT40 is the most accurate T/H sensor on the board, but it sits on
  # a PCB that self-heats from the SGP41 heater (~400°C internally),
  # ESP32-C3 with WiFi, and the regulators. Calibrate the offsets below
  # against a trusted reference thermometer.
  - platform: sht4x
    address: 0x44
    update_interval: 30s
    temperature:
      name: "Temperature (SHT40)"
      id: sht40_temperature
      filters:
        # Subtract self-heating offset. Tune empirically: place a known-good
        # thermometer next to the board, let everything stabilize for 30+
        # minutes, and adjust this until they match.
        - offset: -5.5
    humidity:
      name: "Humidity (SHT40)"
      id: sht40_humidity
      filters:
        # When the board reads ~5°C high, RH reads ~10-15% low because RH
        # is temperature-dependent. We add back a small offset; better
        # accuracy comes from physically separating sensors in next revision.
        - offset: 8.0

  # --- BMP280: pressure + temperature ---
  - platform: bmp280_i2c
    address: 0x76
    update_interval: 30s
    temperature:
      name: "Temperature (BMP280)"
      oversampling: 16x
      filters:
        - offset: -5.5
    pressure:
      name: "Pressure"
      id: bmp280_pressure

  # --- SCD41: CO2, temperature, humidity ---
  - platform: scd4x
    id: scd41_sensor
    address: 0x62
    update_interval: 30s
    measurement_mode: periodic
    # Keep the chip's internal offset at default (4°C). Additional
    # compensation for board self-heating is applied via filter offsets
    # on the individual sensor outputs below, matching how SHT40 and
    # BMP280 handle it.
    ambient_pressure_compensation_source: bmp280_pressure
    co2:
      name: "CO2"
      id: co2_value
      on_value:
        then:
          - script.execute: update_air_quality_led
    temperature:
      name: "Temperature (SCD41)"
      filters:
        # Adjusts for additional board self-heating beyond what the chip's
        # own 4°C internal offset compensates for. Tune to match SHT40.
        - offset: -1.5
    humidity:
      name: "Humidity (SCD41)"
      filters:
        # Higher temp reading on the SCD41 also caused humidity to read low.
        - offset: 4.0

  # --- SGP41: VOC + NOx index (with humidity compensation from SHT40) ---
  - platform: sgp4x
    update_interval: 30s
    compensation:
      humidity_source: sht40_humidity
      temperature_source: sht40_temperature
    voc:
      name: "VOC Index"
      id: voc_index
      on_value:
        then:
          # VOC drives the LED as a fallback when CO2 isn't available
          - script.execute: update_air_quality_led
    nox:
      name: "NOx Index"
      id: nox_index

# ---------------------------------------------------------------------------
# Lights: WS2812 air-quality indicator (GPIO6) and fault LED (GPIO5)
# ---------------------------------------------------------------------------
output:
  - platform: gpio
    pin: GPIO5
    id: fault_led_output

light:
  - platform: esp32_rmt_led_strip
    id: air_quality_led
    name: "Air Quality LED"
    pin: GPIO6
    num_leds: 1
    rgb_order: GRB
    chipset: WS2812
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      - globals.set:
          id: user_wants_led_on
          value: 'true'
      # Capture brightness on each turn-on. HA's brightness slider sends
      # a turn_on with the new brightness, so this also captures slider
      # changes while the LED is already on.
      - lambda: |-
          float b = id(air_quality_led).remote_values.get_brightness();
          if (b > 0.0f && b <= 1.0f) id(user_brightness) = b;
    on_turn_off:
      - globals.set:
          id: user_wants_led_on
          value: 'false'
    effects:
      - pulse:
          name: "Pulse"

  - platform: binary
    id: fault_led
    name: "Fault LED"
    output: fault_led_output
    # Fault LED is purely auto-controlled; always start off and let the
    # fault logic drive it.
    restore_mode: ALWAYS_OFF

# ---------------------------------------------------------------------------
# Buttons for diagnostics / recovery (accessible via web UI)
# ---------------------------------------------------------------------------
button:
  - platform: template
    name: "SCD41 Factory Reset"
    on_press:
      - lambda: 'id(scd41_sensor).factory_reset();'
      - delay: 2s
      - button.press: restart_esp_button

  - platform: template
    name: "Test Fault LED"
    on_press:
      - light.turn_on: fault_led
      - delay: 2s
      - light.turn_off: fault_led

  - platform: restart
    id: restart_esp_button
    name: "Restart ESP"

# ---------------------------------------------------------------------------
# Air-quality color logic
# Prefers CO2 from SCD41 if available; falls back to VOC index from SGP41.
# IMPORTANT: only the COLOR is set by firmware. Brightness and on/off state
# are owned by the user (controllable from Home Assistant and persisted).
# We read the current brightness and on/off state before updating color, then
# re-apply them so the user's choices aren't clobbered.
# ---------------------------------------------------------------------------
script:
  - id: update_air_quality_led
    then:
      - lambda: |-
          // Don't touch the LED until 5s after boot — the WS2812 driver
          // can crash if poked before its internal buffer is initialized.
          if (!id(led_ready)) return;

          float brightness = id(user_brightness);

          // First-boot safety: if somehow brightness is invalid, use 25%.
          if (brightness <= 0.0f || brightness > 1.0f) {
            brightness = 0.25f;
            id(user_brightness) = brightness;
          }

          if (!id(brightness_initialized)) {
            id(brightness_initialized) = true;
          }

          // Decide target color from sensor data.
          float r = 0.0f, g = 0.0f, b = 0.0f;
          bool have_color = false;

          if (id(co2_value).has_state() && !isnan(id(co2_value).state)) {
            float co2 = id(co2_value).state;
            if      (co2 < 800)  { r = 0.0f; g = 1.0f; b = 0.0f; }
            else if (co2 < 1200) { r = 1.0f; g = 1.0f; b = 0.0f; }
            else                 { r = 1.0f; g = 0.0f; b = 0.0f; }
            have_color = true;
          } else if (id(voc_index).has_state() && !isnan(id(voc_index).state)) {
            float voc = id(voc_index).state;
            if      (voc < 150) { r = 0.0f; g = 1.0f; b = 0.0f; }
            else if (voc < 250) { r = 1.0f; g = 1.0f; b = 0.0f; }
            else                { r = 1.0f; g = 0.0f; b = 0.0f; }
            have_color = true;
          }

          if (!have_color) return;

          bool should_be_on = id(user_wants_led_on);

          if (should_be_on) {
            auto call = id(air_quality_led).turn_on();
            call.set_rgb(r, g, b);
            call.set_brightness(brightness);
            call.set_transition_length(0);
            call.perform();
          } else {
            auto call = id(air_quality_led).turn_off();
            call.set_rgb(r, g, b);
            call.set_brightness(brightness);
            call.perform();
          }

          id(led_first_update_done) = true;

# ---------------------------------------------------------------------------
# Fault detection: fault LED is on whenever ANY sensor is missing data.
# Re-evaluated whenever a sensor reports (via update_fault_state script call
# in the on_value hooks above) AND every 30s as a backstop so we still catch
# sensors going silent.
# ---------------------------------------------------------------------------
binary_sensor:
  - platform: template
    name: "Sensor Fault"
    id: sensor_fault
    device_class: problem
    lambda: |-
      bool scd_ok = id(co2_value).has_state()         && !isnan(id(co2_value).state);
      bool sht_ok = id(sht40_temperature).has_state() && !isnan(id(sht40_temperature).state);
      bool bmp_ok = id(bmp280_pressure).has_state()   && !isnan(id(bmp280_pressure).state);
      bool voc_ok = id(voc_index).has_state()         && !isnan(id(voc_index).state);
      return !(scd_ok && sht_ok && bmp_ok && voc_ok);
    on_state:
      then:
        - if:
            condition:
              lambda: 'return x;'
            then:
              - light.turn_on: fault_led
            else:
              - light.turn_off: fault_led

# Periodically recompute the fault state so we notice silent sensors.
# Template binary_sensors aren't PollingComponents, so we re-trigger
# their evaluation by publishing a fresh value via lambda.
interval:
  - interval: 30s
    then:
      - lambda: |-
          bool scd_ok = id(co2_value).has_state()         && !isnan(id(co2_value).state);
          bool sht_ok = id(sht40_temperature).has_state() && !isnan(id(sht40_temperature).state);
          bool bmp_ok = id(bmp280_pressure).has_state()   && !isnan(id(bmp280_pressure).state);
          bool voc_ok = id(voc_index).has_state()         && !isnan(id(voc_index).state);
          id(sensor_fault).publish_state(!(scd_ok && sht_ok && bmp_ok && voc_ok));